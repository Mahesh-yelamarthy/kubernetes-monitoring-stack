groups:
  - name: kubernetes-platform-health
    interval: 30s
    rules:
      - alert: PrometheusTargetDown
        expr: up == 0
        for: 5m
        labels:
          severity: warning
          team: sre
          category: monitoring
        annotations:
          summary: "Prometheus target is down"
          description: "Prometheus has been unable to scrape {{ $labels.job }} target {{ $labels.instance }} for at least 5 minutes."
          runbook_url: "https://github.com/Mahesh-yelamarthy/kubernetes-monitoring-stack/blob/main/runbooks/kubernetes-alerts.md#prometheustargetdown"

      - alert: KubernetesNodeNotReady
        expr: kube_node_status_condition{condition="Ready",status="true"} == 0
        for: 10m
        labels:
          severity: critical
          team: sre
          category: node
        annotations:
          summary: "Kubernetes node is not ready"
          description: "Node {{ $labels.node }} has not reported Ready=true for at least 10 minutes. Workloads may be unavailable or rescheduled."
          runbook_url: "https://github.com/Mahesh-yelamarthy/kubernetes-monitoring-stack/blob/main/runbooks/kubernetes-alerts.md#kubernetesnodenotready"

      - alert: KubernetesPodCrashLooping
        expr: increase(kube_pod_container_status_restarts_total[15m]) > 3
        for: 5m
        labels:
          severity: warning
          team: sre
          category: workload
        annotations:
          summary: "Pod container is restarting repeatedly"
          description: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} restarted more than 3 times in 15 minutes."
          runbook_url: "https://github.com/Mahesh-yelamarthy/kubernetes-monitoring-stack/blob/main/runbooks/kubernetes-alerts.md#kubernetespodcrashlooping"

      - alert: KubernetesPodPending
        expr: kube_pod_status_phase{phase="Pending"} == 1
        for: 15m
        labels:
          severity: warning
          team: sre
          category: workload
        annotations:
          summary: "Pod is stuck pending"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been Pending for at least 15 minutes. Scheduling, image pull, or capacity issues may be blocking startup."
          runbook_url: "https://github.com/Mahesh-yelamarthy/kubernetes-monitoring-stack/blob/main/runbooks/kubernetes-alerts.md#kubernetespodpending"

      - alert: KubernetesDeploymentReplicasUnavailable
        expr: kube_deployment_spec_replicas > 0 and kube_deployment_status_replicas_available < kube_deployment_spec_replicas
        for: 10m
        labels:
          severity: critical
          team: sre
          category: workload
        annotations:
          summary: "Deployment has unavailable replicas"
          description: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has fewer available replicas than desired for at least 10 minutes."
          runbook_url: "https://github.com/Mahesh-yelamarthy/kubernetes-monitoring-stack/blob/main/runbooks/kubernetes-alerts.md#kubernetesdeploymentreplicasunavailable"
